<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>santa-tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg:#FFFFFF; --surface:#FFFFFF; --surface2:#F2F2F7;
    --border:rgba(0,0,0,0.08); --border-strong:rgba(0,0,0,0.11);
    --text:#1C1C1E; --text3:#8E8E93; --accent:#007AFF;
    --concert:#A8D1F0; --concert-bg:#EAF4FC;
    --release:#D4E89A; --release-bg:#F5F7E8;
    --green:#34C759; --check:#D9ED92; --red:#FF3B30; --red-bg:rgba(255,59,48,0.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#000; --surface:#1C1C1E; --surface2:#2C2C2E;
    --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.11);
    --text:#FFF; --text3:#8E8E93;
    --concert-bg:rgba(168,209,240,0.15); --release-bg:rgba(212,232,154,0.15);
    --red-bg:rgba(255,59,48,0.13);
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

  .wrap{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}

  /* ── header ── */
  .header{
    position:fixed;top:0;z-index:100;
    width:100%;max-width:430px;
    background:rgba(255,255,255,0.94);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:0.5px solid var(--border-strong);
    padding-top:var(--safe-top);
  }
  @media(prefers-color-scheme:dark){.header{background:rgba(0,0,0,0.9)}}

  .header-row{display:flex;align-items:center;padding:13px 20px 8px;gap:10px}
  .header-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;flex:1}

  .search-wrap{
    display:flex;align-items:center;background:var(--surface2);
    border-radius:20px;padding:0 11px;gap:6px;height:30px;width:120px;
    transition:width 0.2s ease;
  }
  .search-wrap.focused{width:170px}
  .search-wrap svg{color:var(--text3);flex-shrink:0}
  .search-input{width:100%;background:none;border:none;outline:none;font-size:13px;font-family:var(--font);color:var(--text)}
  .search-input::placeholder{color:var(--text3)}

  .filter-row{display:flex;padding:0 20px 9px;gap:6px}
  .f-tab{
    height:26px;padding:0 12px;border:none;background:var(--surface2);
    border-radius:20px;font-size:12px;font-weight:500;font-family:var(--font);
    color:var(--text3);cursor:pointer;white-space:nowrap;
    transition:background 0.12s,color 0.12s;
  }
  .f-tab:active{opacity:0.6}
  .f-tab.active{background:transparent;color:var(--text);border:1px solid var(--border-strong)}

  /* ── content ── */
  .content{padding-top:92px;padding-bottom:calc(28px + var(--safe-bottom))}

  .section-label{
    font-size:12px;font-weight:600;color:var(--text3);
    letter-spacing:0.05em;text-transform:uppercase;padding:20px 20px 8px;
  }
  .event-list{display:flex;flex-direction:column;gap:8px;padding:0 20px}

  /* ── card — fixed height ── */
  .event-card{
    height:72px;background:var(--surface);
    border-radius:12px;border:0.5px solid var(--border-strong);overflow:hidden;
  }
  .card-inner{display:flex;align-items:stretch;height:100%;padding:0 14px 0 12px;gap:11px}

  .type-bar{width:3px;border-radius:3px;flex-shrink:0;align-self:stretch}
  .bar-concert{background:var(--concert)}
  .bar-release{background:var(--release)}

  .card-info{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
  .card-top{display:flex;align-items:center;gap:5px;margin-bottom:2px}

  .type-pill{
    font-size:10px;font-weight:600;width:28px;text-align:center;
    padding:2px 0;border-radius:4px;flex-shrink:0;
  }
  .pill-concert{background:var(--concert-bg);color:#3A7FA8}
  .pill-release{background:var(--release-bg);color:#5C6B1A}
  .card-artist{font-size:10px;color:var(--text3);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.2px;line-height:1.35;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{display:flex;gap:8px;overflow:hidden}
  .meta-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3);white-space:nowrap;line-height:1}
  .meta-item svg{flex-shrink:0;position:relative;top:0.5px}

  /* right col: d-chip top, checkbox bottom with more gap */
  .card-right{display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:10px 0 12px;flex-shrink:0;width:34px;min-height:72px}

  .d-chip{font-size:10px;font-weight:600;padding:2px 5px;border-radius:20px;background:var(--surface2);color:var(--text3);white-space:nowrap;text-align:center;min-width:30px}
  .d-chip.soon{background:var(--red-bg);color:var(--red)}
  .d-chip.dday{background:#fff;color:var(--text);border:0.5px solid var(--border-strong)}
  .d-chip.past{opacity:0.38}

  .check-circle{
    width:15px;height:15px;border-radius:50%;
    border:0.75px solid #C8C8C8;background:transparent;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all 0.13s;flex-shrink:0;
  }
  .check-circle:active{transform:scale(0.82)}
  .check-circle.going{background:#E8E8E8;border-color:#B0B0B0}
  .check-circle svg{opacity:0;transition:opacity 0.1s}
  .check-circle.going svg{opacity:1}
  .check-placeholder{width:15px;height:15px;flex-shrink:0}

  .empty{text-align:center;padding:64px 20px}
  .empty-icon{font-size:32px;margin-bottom:10px;opacity:0.3}
  .empty-t{font-size:14px;font-weight:500;color:var(--text3)}

  .toast{
    position:fixed;bottom:calc(24px + var(--safe-bottom));
    left:50%;transform:translateX(-50%) translateY(14px);
    background:rgba(28,28,30,0.9);color:#fff;
    font-size:13px;font-weight:500;padding:8px 16px;
    border-radius:20px;z-index:400;opacity:0;
    transition:opacity .16s,transform .16s;
    white-space:nowrap;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">

<header class="header">
  <div class="header-row">
    <span class="header-title">santa-tracker</span>
    <div class="search-wrap" id="searchWrap">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input class="search-input" id="searchInput" placeholder="검색"
        oninput="renderAll()"
        onfocus="document.getElementById('searchWrap').classList.add('focused')"
        onblur="onBlur()" autocomplete="off"/>
    </div>
  </div>
  <div class="filter-row">
    <button class="f-tab active" onclick="setFilter(this,'all')"     data-f="all">전체</button>
    <button class="f-tab"        onclick="setFilter(this,'concert')" data-f="concert">공연</button>
    <button class="f-tab"        onclick="setFilter(this,'release')" data-f="release">발매</button>
    <button class="f-tab"        onclick="setFilter(this,'archive')" data-f="archive">지난 일정</button>
  </div>
</header>

<div class="content">
  <div id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

</div>
<script>
/* ── Apps Script URL ── */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxuQj7vITEM_Qgd-BbiD1qVyEA_cpNFkBoZEcZ2dtAy7j3Nokv_pAu5vHMt7VtYXocHw/exec';
const ATT_KEY    = 'ast_att';

let allEvents = [];
let attended  = {};
let curFilter = 'all';

/* ── utils ── */
function daysUntil(d){
  // 한국 시간(KST, UTC+9) 기준으로 날짜 계산
  const now = new Date();
  const kstOffset = 9 * 60; // 분 단위
  const localOffset = now.getTimezoneOffset(); // 분 단위 (UTC - local)
  const kstNow = new Date(now.getTime() + (kstOffset + localOffset) * 60000);
  kstNow.setHours(0,0,0,0);
  const target = new Date(d + 'T00:00:00+09:00');
  return Math.ceil((target - kstNow) / 86400000);
}
function fmtDate(d){
  return new Date(d).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
}
function fmtTime(t){
  if(!t) return '';
  return String(t).slice(0,5);
}
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), 2000);
}
function onBlur(){
  document.getElementById('searchWrap').classList.remove('focused');
  setTimeout(()=>{ document.getElementById('searchInput').value=''; renderAll(); }, 150);
}

/* ── attended (로컬 캐시) ── */
function loadLocalAtt(){
  try { return JSON.parse(localStorage.getItem(ATT_KEY)||'{}'); } catch(e){ return {}; }
}
function saveLocalAtt(){
  try { localStorage.setItem(ATT_KEY, JSON.stringify(attended)); } catch(e){}
}

/* ── 체크 토글 ── */
async function toggleGoing(id, ev){
  ev.stopPropagation();
  const next = attended[id] === 'going' ? '' : 'going';
  if(next) attended[id] = 'going'; else delete attended[id];
  saveLocalAtt();
  renderAll();
  try {
    await fetch(SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ event_id: id, status: next })
    });
  } catch(e){}
}

/* ── 필터 ── */
function setFilter(el, f){
  document.querySelectorAll('.f-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); curFilter = f; renderAll();
}
function getFiltered(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  return allEvents.filter(e=>{
    const days = daysUntil(e.date);
    if(curFilter === 'archive'){
      // 지난 일정만
      if(days >= 0) return false;
    } else {
      // 나머지 탭은 오늘 포함 앞으로만
      if(days < 0) return false;
      if(curFilter==='concert' && e.type!=='concert') return false;
      if(curFilter==='release' && e.type!=='release') return false;
    }
    if(q && !e.artist.toLowerCase().includes(q) && !e.title.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>{
    // 지난 일정은 최신순
    if(curFilter === 'archive') return new Date(b.date) - new Date(a.date);
    return new Date(a.date) - new Date(b.date);
  });
}

/* ── 렌더 ── */
function renderAll(){
  const filtered = getFiltered();
  const el = document.getElementById('mainContent');
  if(!filtered.length){
    el.innerHTML = `<div class="empty"><div class="empty-icon">🎵</div><div class="empty-t">일정이 없어요</div></div>`;
    return;
  }
  const groups = {};
  filtered.forEach(e=>{
    const d = new Date(e.date);
    const k = `${d.getFullYear()}년 ${d.getMonth()+1}월`;
    (groups[k]=groups[k]||[]).push(e);
  });
  let html = '';
  for(const [month, evs] of Object.entries(groups)){
    html += `<div class="section-label">${month}</div><div class="event-list">`;
    evs.forEach(e=>{ html += renderCard(e); });
    html += `</div>`;
  }
  el.innerHTML = html;
}

function renderCard(e){
  const days    = daysUntil(e.date);
  const isCon   = e.type === 'concert';
  const isGoing = attended[e.id] === 'going';

  let cc='d-chip', ct='';
  if(days===0)             { cc='d-chip dday'; ct='🎉'; }
  else if(days>0&&days<=7) { cc='d-chip soon'; ct=`D-${days}`; }
  else if(days>0)          {                   ct=`D-${days}`; }
  else                     { cc='d-chip past'; ct='종료'; }

  const timeStr = fmtTime(e.time);
  const dateMeta = `<span class="meta-item">
    <svg width="9" height="9" viewBox="0 0 16 16" fill="none">
      <rect x="1.5" y="3" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
      <path d="M5 1.5V4M11 1.5V4M1.5 7h13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>${fmtDate(e.date)}${timeStr ? ' · '+timeStr : ''}</span>`;

  const venueMeta = e.venue ? `<span class="meta-item">
    <svg width="9" height="9" viewBox="0 0 16 16" fill="none">
      <path d="M8 1.5C5.515 1.5 3.5 3.515 3.5 6c0 3.75 4.5 8.5 4.5 8.5S12.5 9.75 12.5 6c0-2.485-2.015-4.5-4.5-4.5zm0 6a1.5 1.5 0 110-3 1.5 1.5 0 010 3z" fill="currentColor"/>
    </svg>${e.venue}</span>` : '';

  const checkEl = isCon
    ? `<div class="check-circle${isGoing?' going':''}" onclick="toggleGoing('${e.id}',event)">
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
          <path d="M1 4l2 2 4-4" stroke="#888" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`
    : `<div class="check-placeholder"></div>`;

  return `<div class="event-card"><div class="card-inner">
    <div class="type-bar ${isCon?'bar-concert':'bar-release'}"></div>
    <div class="card-info">
      <div class="card-top">
        <span class="card-artist">${e.artist}</span>
      </div>
      <div class="card-title">${e.title}</div>
      <div class="card-meta">${dateMeta}${venueMeta}</div>
    </div>
    <div class="card-right">
      <span class="${cc}">${ct}</span>
      ${checkEl}
    </div>
  </div></div>`;
}

/* ── JSONP로 데이터 로드 ── */
function loadData(){
  attended = loadLocalAtt();
  renderAll(); // 로컬 캐시 먼저 보여주기

  const cbName = 'asCb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(json){
    delete window[cbName];
    document.head.removeChild(script);

    if(!json || !json.ok){ console.warn('script error:', json); return; }

    const rows = json.data.events || [];

    // 서버 attended 반영
    const serverAtt = {};
    (json.data.attended || []).forEach(a=>{ if(a.event_id && a.status) serverAtt[a.event_id] = a.status; });
    attended = { ...loadLocalAtt(), ...serverAtt };
    saveLocalAtt();

    allEvents = rows
      .filter(r => r.artist && r.title && r.date)
      .map((r, i) => ({
        id:     `${r.artist}_${r.date}_${i}`,
        artist: r.artist,
        title:  r.title,
        date:   r.date,
        time:   r.time  || '',
        venue:  r.venue || '',
        type:   (r.type || 'concert').toLowerCase(),
      }));

    renderAll();
  };

  script.onerror = function(){ console.warn('JSONP load failed'); };
  script.src = `${SCRIPT_URL}?action=all&callback=${cbName}&t=${Date.now()}`;
  document.head.appendChild(script);
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
