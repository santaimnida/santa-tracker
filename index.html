<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>공연을 가자~ 그만 가자</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg:#FFFFFF; --surface:#FFFFFF; --surface2:#F2F2F7;
    --border:rgba(0,0,0,0.08); --border-strong:rgba(0,0,0,0.11);
    --text:#1C1C1E; --text3:#8E8E93;
    --concert:#A8D1F0; --concert-bg:#EAF4FC;
    --release:#D4E89A; --release-bg:#F5F7E8;
    --red:#FF3B30;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#000; --surface:#1C1C1E; --surface2:#2C2C2E;
    --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.11);
    --text:#FFF; --text3:#8E8E93;
    --concert-bg:rgba(168,209,240,0.15);
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .wrap{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}

  /* ── header ── */
  .header{
    position:fixed;top:0;z-index:100;width:100%;max-width:430px;
    background:rgba(255,255,255,0.94);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:0.5px solid var(--border-strong);
    padding-top:var(--safe-top);
  }
  @media(prefers-color-scheme:dark){.header{background:rgba(0,0,0,0.9)}}
  .header-row{display:flex;align-items:center;padding:13px 20px 8px;gap:10px}
  .header-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;flex:1;cursor:pointer;user-select:none}
  .header-title:active{opacity:0.5}

  .search-row{padding:0 20px 9px}
  .search-wrap{
    display:flex;align-items:center;background:var(--surface2);
    border-radius:20px;padding:0 11px;gap:6px;height:30px;width:100%;
  }
  .search-wrap svg{color:var(--text3);flex-shrink:0}
  .search-input{width:100%;background:none;border:none;outline:none;font-size:13px;font-family:var(--font);color:var(--text)}
  .search-input::placeholder{color:var(--text3)}

  .add-btn{
    width:30px;height:30px;border-radius:50%;background:var(--surface2);border:none;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--text3);font-size:20px;line-height:1;flex-shrink:0;transition:opacity 0.1s;
  }
  .add-btn:active{opacity:0.5}

  .filter-row{display:flex;padding:0 20px 9px;gap:6px}
  .f-tab{
    height:26px;padding:0 12px;border:1px solid transparent;background:var(--surface2);
    border-radius:20px;font-size:12px;font-weight:500;font-family:var(--font);
    color:var(--text3);cursor:pointer;white-space:nowrap;
    transition:background 0.12s,color 0.12s,border-color 0.12s;
  }
  .f-tab:active{opacity:0.6}
  .f-tab.active{background:transparent;color:var(--text);border-color:var(--border-strong)}

  /* ── content ── */
  .content{padding-top:92px;padding-bottom:calc(28px + var(--safe-bottom));transition:padding-top 0.15s}
  .content.search-visible{padding-top:140px}
  .section-label{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;padding:20px 20px 8px}
  .event-list{display:flex;flex-direction:column;gap:8px;padding:0 20px}

  /* ── card ── */
  .card-inner{display:flex;align-items:stretch;height:100%;padding:0 14px 0 12px;gap:11px}
  .type-bar{width:3px;border-radius:3px;flex-shrink:0;align-self:stretch;background:var(--concert)}
  .card-info{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
  .card-top{display:flex;align-items:center;margin-bottom:2px}
  .card-artist{font-size:10px;color:var(--text3);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.2px;line-height:1.35;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{display:flex;gap:8px;overflow:hidden}
  .meta-item{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3);white-space:nowrap;line-height:1.4;position:relative;top:1px}
  .meta-item svg{flex-shrink:0}

  .card-right{display:flex;align-items:center;justify-content:center;flex-shrink:0;width:34px}
  .d-chip{font-size:10px;font-weight:600;padding:2px 5px;border-radius:20px;background:var(--surface2);color:var(--text3);white-space:nowrap;text-align:center;min-width:42px}
  .d-chip.soon{background:#FEF0EF;color:#E07070}
  .d-chip.dday{background:#fff;color:var(--text);border:0.5px solid var(--border-strong)}
  .d-chip.past{opacity:0.38}

  /* ── archive ── */
  .archive-wrap{padding:0 20px}
  .archive-year{margin-bottom:28px}
  .archive-year-label{font-size:20px;font-weight:600;letter-spacing:-0.5px;padding:20px 0 14px;border-bottom:0.5px solid var(--border-strong);margin-bottom:12px}

  .archive-month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:4px}

  .month-btn{
    height:40px;border-radius:10px;border:0.5px solid var(--border);
    background:var(--surface2);font-size:12px;font-weight:500;
    font-family:var(--font);color:var(--text3);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;transition:all 0.12s;
  }
  .month-btn:disabled{opacity:0.28;cursor:default}
  .month-btn.has{background:var(--surface);border-color:var(--border-strong);color:var(--text)}
  .month-btn.active{background:var(--concert-bg);border-color:var(--concert);color:var(--text)}
  .month-btn:active:not(:disabled){opacity:0.6}

  .month-count{font-size:10px;font-weight:600;color:var(--text3)}
  .month-btn.active .month-count{color:var(--text3)}

  .month-list{
    display:flex;flex-direction:column;gap:8px;
    padding:10px 0 6px;
  }

  /* ── stats tab ── */
  .stats-header{padding:16px 20px 0}

  /* 연도: 밑줄 스타일 */
  .stats-year-tabs{display:flex;gap:20px;margin-bottom:4px}
  .stats-year-btn{
    background:none;border:none;padding:0 0 3px;
    font-size:16px;font-weight:600;font-family:var(--font);
    color:var(--text3);cursor:pointer;
    border-bottom:2px solid transparent;
    transition:color 0.12s,border-color 0.12s;
  }
  .stats-year-btn.active{color:var(--text);border-bottom-color:var(--text)}

  .stats-total-inline{font-size:12px;color:var(--text3);margin-top:10px;margin-bottom:14px}

  /* 아티스트 / 공연장 세그먼트 */
  .stats-seg{display:flex;background:var(--surface2);border-radius:10px;padding:2px;margin-top:14px}
  .stats-seg-btn{
    flex:1;height:28px;border:none;border-radius:8px;
    font-size:12px;font-weight:500;font-family:var(--font);
    color:var(--text3);cursor:pointer;background:transparent;
    transition:all 0.12s;
  }
  .stats-seg-btn.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.08)}

  .stats-list{padding:6px 20px 0}
  .stats-row{display:flex;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border);gap:10px;min-height:40px}
  .stats-row:last-child{border-bottom:none}
  .stats-name{font-size:13px;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;font-family:var(--font)}
  .stats-count{font-size:12px;font-weight:600;color:var(--text);flex-shrink:0;min-width:24px;text-align:right;line-height:1;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .stats-bar-wrap{width:80px;height:4px;background:var(--surface2);border-radius:2px;flex-shrink:0;overflow:hidden}
  .stats-bar{height:100%;border-radius:2px;transition:width 0.3s ease}

  /* ── empty ── */
  .empty{text-align:center;padding:64px 20px}
  .empty-icon{font-size:32px;margin-bottom:10px;opacity:0.3}
  .empty-t{font-size:14px;font-weight:500;color:var(--text3)}

  /* ── bottom sheet ── */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:200;display:none;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .bottom-panel,.center-panel{
    background:var(--surface);border-radius:20px;
    padding:24px 20px;
    width:calc(100% - 40px);max-width:390px;
    max-height:85vh;overflow-y:auto;
  }
  .panel-handle{width:34px;height:4px;background:var(--border-strong);border-radius:2px;margin:0 auto 16px}
  .panel-title{font-size:16px;font-weight:600;margin-bottom:16px}

  .form-row{margin-bottom:12px}
  .form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px}
  .form-input{
    width:100%;background:var(--surface2);border:0.5px solid var(--border-strong);
    border-radius:10px;padding:10px 13px;font-size:14px;font-family:var(--font);
    color:var(--text);outline:none;min-width:0;box-sizing:border-box;
  }
  input[type="date"].form-input{
    -webkit-appearance:none;appearance:none;font-size:13px;padding:10px 8px;
  }
  .form-input:focus{border-color:rgba(0,0,0,0.3)}
  .form-row-half{display:flex;gap:10px;margin-bottom:12px}
  .form-row-half .form-row{flex:1;margin-bottom:0;min-width:0}
  .form-row-half .form-row:last-child{flex:0 0 90px}

  .btn-submit{
    width:100%;height:48px;background:var(--text);color:var(--bg);
    border:none;border-radius:12px;font-size:15px;font-weight:600;
    font-family:var(--font);cursor:pointer;margin-top:4px;
  }
  .btn-submit:active{opacity:0.7}

  .toast{
    position:fixed;bottom:calc(24px + var(--safe-bottom));
    left:50%;transform:translateX(-50%) translateY(14px);
    background:rgba(28,28,30,0.9);color:#fff;
    font-size:13px;font-weight:500;padding:8px 16px;
    border-radius:20px;z-index:400;opacity:0;
    transition:opacity .16s,transform .16s;white-space:nowrap;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── tap to expand card actions ── */
  .card-wrap{border-radius:12px;overflow:hidden;border:0.5px solid var(--border-strong);margin-bottom:0}
  .event-card{
    height:72px;background:var(--surface);
    cursor:pointer;
  }
  .card-actions{
    display:none;
    background:var(--surface);
    border-top:0.5px solid var(--border);
  }
  .card-actions.open{display:flex}
  .card-action-btn{
    flex:1;height:38px;border:none;background:none;
    font-size:13px;font-weight:500;font-family:var(--font);
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
    transition:opacity 0.1s;
  }
  .card-action-btn:active{opacity:0.5}
  .card-action-btn.delete{color:#FF3B30;border-right:0.5px solid var(--border)}
  .card-action-btn.edit{color:var(--text)}


  /* ── autocomplete dropdown ── */
  .ac-wrap{position:relative}
  .ac-dropdown{
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    background:var(--surface);border:0.5px solid var(--border-strong);
    border-radius:10px;z-index:500;overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,0.10);
    display:none;max-height:180px;overflow-y:auto;
  }
  .ac-dropdown.open{display:block}
  .ac-item{
    padding:11px 13px;font-size:14px;color:var(--text);
    cursor:pointer;border-bottom:0.5px solid var(--border);
    font-family:var(--font);
  }
  .ac-item:last-child{border-bottom:none}
  .ac-item:active{background:var(--surface2)}


  /* ── detail sheet ── */
  .detail-header{margin-bottom:16px}
  .detail-artist{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:4px}
  .detail-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.4px;line-height:1.3;margin-bottom:14px}

  .detail-rows{margin-bottom:16px}
  .detail-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
  .detail-row:last-child{border-bottom:none}
  .detail-label{font-size:11px;font-weight:600;color:var(--text3);width:52px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.04em}
  .detail-value{font-size:14px;color:var(--text);flex:1}
  .detail-price{font-size:14px;color:var(--text);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  /* setlist toggle */
  .setlist-wrap{margin-bottom:16px}
  .setlist-toggle{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;background:none;border:none;padding:10px 0;
    font-size:13px;font-weight:600;font-family:var(--font);color:var(--text);
    cursor:pointer;border-bottom:0.5px solid var(--border);
  }
  .setlist-toggle-icon{font-size:11px;color:var(--text3);transition:transform 0.18s}
  .setlist-toggle-icon.open{transform:rotate(180deg)}
  .setlist-body{display:none;padding:10px 0 4px}
  .setlist-body.open{display:block}
  .setlist-input{
    width:100%;background:var(--surface2);border:0.5px solid var(--border-strong);
    border-radius:10px;padding:10px 13px;font-size:13px;font-family:var(--font);
    color:var(--text);outline:none;resize:none;line-height:1.6;min-height:100px;
  }
  .setlist-input:focus{border-color:rgba(0,0,0,0.3)}
  .setlist-hint{font-size:11px;color:var(--text3);margin-top:6px}
  .setlist-save-btn{
    margin-top:8px;padding:7px 14px;background:var(--text);color:var(--bg);
    border:none;border-radius:8px;font-size:12px;font-weight:600;
    font-family:var(--font);cursor:pointer;
  }
  .setlist-save-btn:active{opacity:0.7}

  .detail-action-row{display:flex;gap:8px;margin-top:4px}
  .detail-action-btn{
    flex:1;height:44px;border-radius:10px;border:0.5px solid var(--border-strong);
    background:none;font-size:14px;font-weight:500;font-family:var(--font);
    cursor:pointer;transition:opacity 0.1s;
  }
  .detail-action-btn:active{opacity:0.6}
  .detail-action-btn.delete{color:var(--red)}
  .detail-action-btn.edit{color:var(--text)}


  /* ── poster grid ── */
  .poster-grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:6px;padding:10px 0 6px;
  }
  .poster-cell{
    aspect-ratio:3/4;border-radius:8px;overflow:hidden;
    background:var(--surface2);border:0.5px solid var(--border);
    cursor:pointer;position:relative;
  }
  .poster-cell img{width:100%;height:100%;object-fit:cover;display:block}
  .poster-cell-label{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:6px;text-align:center;
    font-size:10px;font-weight:600;color:var(--text3);line-height:1.3;
  }
  .poster-cell-date{
    position:absolute;bottom:0;left:0;right:0;
    background:rgba(0,0,0,0.45);color:#fff;
    font-size:9px;font-weight:600;padding:3px 5px;text-align:center;
  }


  /* ── calendar view ── */
  .cal-wrap{position:relative}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
  .nav-label-btn{
    display:flex;align-items:center;gap:4px;
    background:var(--surface2);border:0.5px solid var(--border-strong);
    border-radius:8px;cursor:pointer;height:28px;padding:0 10px;
    font-family:var(--font);
  }
  .nav-label-text{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.2px}
  .nav-chevron{font-size:11px;color:var(--text3);transition:transform .15s;display:inline-block}
  .nav-chevron.open{transform:rotate(180deg)}
  .nav-arrows{display:flex;gap:4px}
  .nav-arr{
    background:var(--surface2);border:0.5px solid var(--border-strong);
    border-radius:8px;cursor:pointer;width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;
    color:var(--text3);font-size:15px;font-family:var(--font);
  }
  .nav-arr:active{opacity:0.5}

  .cal-dd{
    position:absolute;top:52px;left:20px;right:20px;
    background:var(--surface);border:0.5px solid var(--border-strong);
    border-radius:14px;padding:14px;z-index:50;
    box-shadow:0 4px 20px rgba(0,0,0,.1);display:none;
  }
  .cal-dd.open{display:block}
  .dd-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .dd-years{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .dd-months{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .dd-btn{
    height:30px;border:0.5px solid var(--border-strong);border-radius:8px;
    background:none;font-size:12px;font-weight:500;font-family:var(--font);
    color:var(--text3);cursor:pointer;
    display:flex;align-items:center;justify-content:center;padding:0 10px;
    transition:all .12s;
  }
  .dd-btn.year{min-width:52px}
  .dd-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
  .dd-btn:active{opacity:0.6}

  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);padding:0 12px;margin-bottom:4px}
  .cal-dow-cell{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 12px 16px}
  .cal-cell{
    aspect-ratio:1;border-radius:8px;overflow:hidden;
    position:relative;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .cal-cell img{
    width:100%;height:100%;object-fit:cover;
    object-position:center;display:block;
  }
  .cal-num{font-size:12px;font-weight:600}
  .cal-num.has{color:var(--text)}
  .cal-num.none{color:var(--text3);font-weight:400}
  .cal-empty{aspect-ratio:1}

</style>
</head>
<body>
<div class="wrap">

<header class="header">
  <div class="header-row">
    <span class="header-title" onclick="location.reload()">공연을 가자~ 그만 가자</span>
    <button class="add-btn" onclick="openAdd()" aria-label="일정 추가">+</button>
  </div>
  <div class="filter-row">
    <button class="f-tab active" onclick="setFilter(this,'upcoming')" data-f="upcoming">🎟️</button>
    <button class="f-tab"        onclick="setFilter(this,'archive')"  data-f="archive">🎞️</button>
    <button class="f-tab"        onclick="setFilter(this,'stats')"    data-f="stats">🌀</button>
    <button class="f-tab"        onclick="setFilter(this,'all')"      data-f="all">🔭</button>
  </div>
  <div class="search-row" id="searchRow" style="display:none">
    <div class="search-wrap" id="searchWrap">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input class="search-input" id="searchInput" placeholder="검색"
        oninput="renderAll()" autocomplete="off"/>
    </div>
  </div>
</header>

<div class="content" id="mainWrap">
  <div id="mainContent"></div>
</div>

<!-- ── Add sheet ── -->
<div class="overlay" id="overlay" onclick="closeIfOut(event)">
  <div class="bottom-panel">

    <div class="form-row">
      <div class="form-label">아티스트</div>
      <div class="ac-wrap">
        <input class="form-input" id="fArtist" placeholder="아티스트 이름" oninput="showAc('fArtist','fArtistDrop','artist')" onfocus="showAc('fArtist','fArtistDrop','artist')" onblur="hideAc('fArtistDrop')" autocomplete="off"/>
        <div class="ac-dropdown" id="fArtistDrop"></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">공연명</div>
      <input class="form-input" id="fTitle" placeholder="공연 제목"/>
    </div>
    <div class="form-row-half">
      <div class="form-row">
        <div class="form-label">날짜</div>
        <input class="form-input" id="fDate" type="date"/>
      </div>
      <div class="form-row">
        <div class="form-label">시간 (선택)</div>
        <input class="form-input" id="fTime" type="text" placeholder="18:00" maxlength="5" inputmode="numeric" oninput="autoTime(this)"/>
      </div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZEC6Rvzu11m_a0nibW57kOzCk7sJNK2AjeOzxVNO1qrzbiT4n77w50djZ-su7HF1Hjw/exec';
const EVT_KEY    = 'ast_events';

let allEvents = [];
let curFilter = 'upcoming';

/* ── utils ── */
function daysUntil(d){
  const now = new Date();
  const kstNow = new Date(now.getTime() + (9*60 + now.getTimezoneOffset())*60000);
  kstNow.setHours(0,0,0,0);
  return Math.ceil((new Date(d+'T00:00:00+09:00') - kstNow) / 86400000);
}
function fmtDate(d){ return new Date(d).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'}); }
function fmtTime(t){ return t ? String(t).slice(0,5) : ''; }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2000);
}
function onBlur(){}
function saveEvents(){ try{localStorage.setItem(EVT_KEY,JSON.stringify(allEvents));}catch(e){} }

/* ── filter ── */
function setFilter(el,f){
  document.querySelectorAll('.f-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  curFilter=f;
  const searchRow=document.getElementById('searchRow');
  const contentEl=document.getElementById('mainWrap');
  if(searchRow){
    const show=f==='all';
    searchRow.style.display=show?'block':'none';
    if(contentEl) contentEl.classList.toggle('search-visible', show);
  }
  if(f!=='all'){
    const si=document.getElementById('searchInput');
    if(si) si.value='';
  }
  renderAll();
}

function getFiltered(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  return allEvents.filter(e=>{
    const days=daysUntil(e.date);
    if(curFilter==='archive'){ if(days>=0) return false; }
    else if(curFilter==='upcoming'){ if(days<0) return false; }
    else if(curFilter==='all'){ /* show all */ }
    if(q&&!e.artist.toLowerCase().includes(q)&&!e.title.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));
}

/* ── render ── */
function renderAll(){
  if(curFilter==='stats'){ renderStats(); return; }
  if(curFilter==='archive'){ renderArchive(); return; }  const filtered=getFiltered();
  const el=document.getElementById('mainContent');
  if(!filtered.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🎤</div><div class="empty-t">공연이 없어요</div></div>`;
    return;
  }
  const groups={};
  filtered.forEach(e=>{
    const d=new Date(e.date);
    const k=`${d.getFullYear()}년 ${d.getMonth()+1}월`;
    (groups[k]=groups[k]||[]).push(e);
  });
  let html='';
  for(const [month,evs] of Object.entries(groups)){
    html+=`<div class="section-label">${month}</div><div class="event-list">`;
    evs.forEach(e=>{html+=renderCard(e);});
    html+=`</div>`;
  }
  el.innerHTML=html;
}

function renderCard(e){
  const days=daysUntil(e.date);
  let cc='d-chip',ct='';
  if(days===0){cc='d-chip dday';ct='🎉';}
  else if(days>0&&days<=7){cc='d-chip soon';ct=`D-${days}`;}
  else if(days>0){ct=`D-${days}`;}
  else{cc='d-chip past';ct='종료';}

  const timeStr=fmtTime(e.time);
  const dateMeta=`<span class="meta-item">
    <svg width="9" height="9" viewBox="0 0 16 16" fill="none">
      <rect x="1.5" y="3" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
      <path d="M5 1.5V4M11 1.5V4M1.5 7h13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>${fmtDate(e.date)}${timeStr?' · '+timeStr:''}</span>`;
  const venueMeta=e.venue?`<span class="meta-item">
    <svg width="9" height="9" viewBox="0 0 16 16" fill="none">
      <path d="M8 1.5C5.515 1.5 3.5 3.515 3.5 6c0 3.75 4.5 8.5 4.5 8.5S12.5 9.75 12.5 6c0-2.485-2.015-4.5-4.5-4.5zm0 6a1.5 1.5 0 110-3 1.5 1.5 0 010 3z" fill="currentColor"/>
    </svg>${e.venue}</span>`:'';

  const year = new Date(e.date).getFullYear();
  const barColor = year === 2023 ? '#ffefa6'
                 : year === 2024 ? '#F8D4FC'
                 : year === 2025 ? '#d4e89a'
                 : year === 2026 ? '#a8d1f0'
                 : year === 2027 ? '#ffb9c6'
                 : '#a48f7b';

  return `<div class="card-wrap" id="wrap_${e.id}">
    <div class="event-card" onclick="openDetail('${e.id}')">
      <div class="card-inner">
        <div class="type-bar" style="background:${barColor}"></div>
        <div class="card-info">
          <div class="card-top"><span class="card-artist">${e.artist}</span></div>
          <div class="card-title">${e.title}</div>
          <div class="card-meta">${dateMeta}${venueMeta}</div>
        </div>
        <div class="card-right"><span class="${cc}">${ct}</span></div>
      </div>
    </div>

  </div>`;
}

/* ── archive render: year → month grid → concert list ── */
/* ── calendar state ── */
let _calYear=null, _calMonth=null;

function renderArchive(){
  const past=allEvents.filter(e=>daysUntil(e.date)<0);
  // default to most recent month with events
  if(!_calYear || !_calMonth){
    if(past.length){
      const latest=past.reduce((a,b)=>new Date(a.date)>new Date(b.date)?a:b);
      const d=new Date(latest.date);
      _calYear=d.getFullYear(); _calMonth=d.getMonth()+1;
    } else {
      const now=new Date(); _calYear=now.getFullYear(); _calMonth=now.getMonth()+1;
    }
  }
  renderCalendar(past);
}

function renderCalendar(past){
  const el=document.getElementById('mainContent');
  if(!past) past=allEvents.filter(e=>daysUntil(e.date)<0);

  // build event map by date
  const byDate={};
  past.forEach(e=>{
    const d=new Date(e.date);
    const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
    if(y===_calYear && m===_calMonth){
      if(!byDate[day]) byDate[day]=[];
      byDate[day].push(e);
    }
  });

  // available years from past events
  const years=[...new Set(past.map(e=>new Date(e.date).getFullYear()))].sort((a,b)=>a-b);
  if(!years.length) years.push(new Date().getFullYear());

  const firstDay=new Date(_calYear,_calMonth-1,1).getDay();
  const daysInMonth=new Date(_calYear,_calMonth,0).getDate();

  let html=`<div class="cal-wrap">
    <div class="cal-nav">
      <button class="nav-label-btn" onclick="toggleCalDd()">
        <span class="nav-label-text" id="calLabel">${_calYear}년 ${_calMonth}월</span>
        <span class="nav-chevron" id="calChevron">▾</span>
      </button>
      <div class="nav-arrows">
        <button class="nav-arr" onclick="moveCalMonth(-1)">‹</button>
        <button class="nav-arr" onclick="moveCalMonth(1)">›</button>
      </div>
    </div>

    <div class="cal-dd" id="calDd">
      <div class="dd-sec">년도</div>
      <div class="dd-years">
        ${years.map(y=>`<button class="dd-btn year${y===_calYear?' active':''}" onclick="selCalYear(${y})">${y}</button>`).join('')}
      </div>
      <div class="dd-sec">월</div>
      <div class="dd-months">
        ${Array.from({length:12},(_,i)=>`<button class="dd-btn${i+1===_calMonth?' active':''}" onclick="selCalMonth(${i+1})">${i+1}월</button>`).join('')}
      </div>
    </div>

    <div class="cal-dow">
      <div class="cal-dow-cell">일</div><div class="cal-dow-cell">월</div><div class="cal-dow-cell">화</div>
      <div class="cal-dow-cell">수</div><div class="cal-dow-cell">목</div><div class="cal-dow-cell">금</div>
      <div class="cal-dow-cell">토</div>
    </div>
    <div class="cal-grid">`;

  for(let i=0;i<firstDay;i++) html+=`<div class="cal-empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const evs=byDate[d]||[];
    const e=evs[0];
    if(e&&e.image){
      html+=`<div class="cal-cell" onclick="openDetail('${e.id}')">
        <img src="${e.image}" alt="" loading="lazy"/>
      </div>`;
    } else if(e){
      html+=`<div class="cal-cell" onclick="openDetail('${e.id}')">
        <span class="cal-num has">${d}</span>
      </div>`;
    } else {
      html+=`<div class="cal-cell" style="cursor:default">
        <span class="cal-num none">${d}</span>
      </div>`;
    }
  }

  html+=`</div></div>`;
  el.innerHTML=html;
}

function toggleCalDd(){
  const dd=document.getElementById('calDd');
  const ch=document.getElementById('calChevron');
  if(!dd||!ch) return;
  const open=dd.classList.toggle('open');
  ch.style.transform=open?'rotate(180deg)':'';
}
function selCalYear(y){ _calYear=y; renderCalendar(); }
function selCalMonth(m){
  _calMonth=m;
  document.getElementById('calDd')?.classList.remove('open');
  const ch=document.getElementById('calChevron');
  if(ch) ch.style.transform='';
  renderCalendar();
}
function moveCalMonth(d){
  _calMonth+=d;
  if(_calMonth>12){_calMonth=1;_calYear++;}
  if(_calMonth<1){_calMonth=12;_calYear--;}
  renderCalendar();
}
function renderStats(){
  const el=document.getElementById('mainContent');
  const past=allEvents.filter(e=>daysUntil(e.date)<0);
  if(!past.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-t">아직 지난 공연이 없어요</div></div>`;
    return;
  }

  const byYear={};
  past.forEach(e=>{
    const y=new Date(e.date).getFullYear();
    (byYear[y]=byYear[y]||[]).push(e);
  });
  const years=Object.keys(byYear).sort((a,b)=>b-a);
  if(!window._statsYear||!byYear[window._statsYear]) window._statsYear=years[0];
  if(!window._statsSeg) window._statsSeg='artist';
  const activeYear=window._statsYear;
  const activeSeg=window._statsSeg;
  const evs=byYear[activeYear]||[];
  const barColor = activeYear == 2023 ? '#ffefa6'
                 : activeYear == 2024 ? '#F8D4FC'
                 : activeYear == 2025 ? '#d4e89a'
                 : activeYear == 2026 ? '#a8d1f0'
                 : activeYear == 2027 ? '#ffb9c6'
                 : '#a48f7b';

    const uniqueArtists = new Set();
    evs.forEach(e=>e.artist.split(',').map(a=>a.trim()).filter(Boolean).forEach(a=>uniqueArtists.add(a)));
    const uniqueVenues = new Set(evs.filter(e=>e.venue).map(e=>e.venue));

  // header: 연도 밑줄 탭 + 총 공연수 작게
  let html=`<div class="stats-header">
    <div class="stats-year-tabs">`;
  years.forEach(y=>{
    html+=`<button class="stats-year-btn${y==activeYear?' active':''}" onclick="switchStatsYear('${y}')">${y}</button>`;
  });
  html+=`</div>
    <div class="stats-total-inline">총 ${evs.length}회 &nbsp;·&nbsp; ${uniqueArtists.size}팀 &nbsp;·&nbsp; ${uniqueVenues.size}곳</div>
    <div class="stats-seg">
      <button class="stats-seg-btn${activeSeg==='artist'?' active':''}" onclick="switchStatsSeg('artist')">아티스트</button>
      <button class="stats-seg-btn${activeSeg==='venue'?' active':''}" onclick="switchStatsSeg('venue')">공연장</button>
      <button class="stats-seg-btn${activeSeg==='spend'?' active':''}" onclick="switchStatsSeg('spend')">지출</button>
    </div>
  </div>`;

  if(activeSeg==='artist'){
    const counts={};
    evs.forEach(e=>{
      e.artist.split(',').map(a=>a.trim()).filter(Boolean)
        .forEach(a=>{ counts[a]=(counts[a]||0)+1; });
    });
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    const maxVal=sorted[0]?.[1]||1;
    html+=`<div class="stats-list">`;
    sorted.forEach(([name,count])=>{
      const pct=Math.round((count/maxVal)*100);
      html+=`<div class="stats-row">
        <div class="stats-name">${name}</div>
        <div class="stats-bar-wrap"><div class="stats-bar" style="width:${pct}%;background:${barColor}"></div></div>
        <div class="stats-count">${count}회</div>
      </div>`;
    });
    html+=`</div>`;
  } else if(activeSeg==='venue'){
    const counts={};
    evs.forEach(e=>{ if(e.venue) counts[e.venue]=(counts[e.venue]||0)+1; });
    const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    const maxVal=sorted[0]?.[1]||1;
    if(sorted.length){
      html+=`<div class="stats-list">`;
      sorted.forEach(([name,count])=>{
        const pct=Math.round((count/maxVal)*100);
        html+=`<div class="stats-row">
          <div class="stats-name">${name}</div>
          <div class="stats-bar-wrap"><div class="stats-bar" style="width:${pct}%;background:${barColor}"></div></div>
          <div class="stats-count">${count}회</div>
        </div>`;
      });
      html+=`</div>`;
    } else {
      html+=`<div class="empty"><div class="empty-icon" style="font-size:24px">📍</div><div class="empty-t" style="font-size:13px">공연장 정보가 없어요</div></div>`;
    }
  } else {
    // 지출 통계
    const paid=evs.filter(e=>e.price!=null&&e.price>0);
    const free=evs.filter(e=>e.price!=null&&e.price===0);
    const totalSpend=paid.reduce((s,e)=>s+(e.price||0),0);
    const avgPrice=paid.length?Math.round(totalSpend/paid.length):0;
    const fmtKRW=n=>n.toLocaleString('ko-KR')+'원';

    if(!paid.length&&!free.length){
      html+=`<div class="empty"><div class="empty-icon" style="font-size:24px">💰</div><div class="empty-t" style="font-size:13px">티켓 금액 정보가 없어요</div></div>`;
    } else {
      // 요약
      html+=`<div class="stats-list">
        <div class="stats-row">
          <div class="stats-name">총 지출</div>
          <div class="stats-count" style="font-size:14px">${fmtKRW(totalSpend)}</div>
        </div>
        <div class="stats-row">
          <div class="stats-name">평균 티켓값</div>
          <div class="stats-count">${fmtKRW(avgPrice)}</div>
        </div>
        <div class="stats-row">
          <div class="stats-name">유료 공연</div>
          <div class="stats-count">${paid.length}회</div>
        </div>
        <div class="stats-row">
          <div class="stats-name">무료 공연</div>
          <div class="stats-count">${free.length}회</div>
        </div>
      </div>`;
      // 티켓처별 — 바 시작점 고정을 위해 flex layout 정리
      if(paid.length){
        const ticketCounts={};
        const ticketSpend={};
        paid.forEach(e=>{
          const t=e.ticket||'기타';
          ticketCounts[t]=(ticketCounts[t]||0)+1;
          ticketSpend[t]=(ticketSpend[t]||0)+(e.price||0);
        });
        const ticketSorted=Object.entries(ticketSpend).sort((a,b)=>b[1]-a[1]);
        const maxSpend=ticketSorted[0]?.[1]||1;
        html+=`<div class="stats-list" style="margin-top:8px">`;
        ticketSorted.forEach(([name,spend])=>{
          const pct=Math.round((spend/maxSpend)*100);
          const cnt=ticketCounts[name];
          html+=`<div class="stats-row">
            <div class="stats-name">${name}</div>
            <div class="stats-bar-wrap" style="flex-shrink:0"><div class="stats-bar" style="width:${pct}%;background:${barColor}"></div></div>
            <div class="stats-count" style="flex-shrink:0;min-width:90px;text-align:right;font-size:11px;font-variant-numeric:tabular-nums;font-feature-settings:'tnum'">${fmtKRW(spend)} <span style="color:var(--text3);font-weight:400">·${cnt}회</span></div>
          </div>`;
        });
        html+=`</div>`;
      }
    }
  }

  el.innerHTML=html;
}

function switchStatsYear(y){ window._statsYear=y; renderStats(); }
function switchStatsSeg(s){ window._statsSeg=s; renderStats(); }

/* ── add form ── */
function openAdd(){
  const today=new Date();
  const yyyy=today.getFullYear();
  const mm=String(today.getMonth()+1).padStart(2,'0');
  const dd=String(today.getDate()).padStart(2,'0');
  document.getElementById('fDate').value=`${yyyy}-${mm}-${dd}`;
  document.getElementById('fArtist').value='';
  document.getElementById('fTitle').value='';
  document.getElementById('fTime').value='';
  document.getElementById('fVenue').value='';
  document.getElementById('fPrice').value='';
  document.getElementById('fTicket').value='';
  document.getElementById('fImage').value='';
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fArtist').focus(),300);
}
function closeIfOut(e){ if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); }

async function submitAdd(){
  const artist=document.getElementById('fArtist').value.trim();
  const title =document.getElementById('fTitle').value.trim();
  const date  =document.getElementById('fDate').value;
  const time  =document.getElementById('fTime').value;
  const venue =document.getElementById('fVenue').value.trim();
  const price =document.getElementById('fPrice').value.replace(/[^0-9]/g,'');
  const ticket=document.getElementById('fTicket').value.trim();
  const image=document.getElementById('fImage').value.trim();
  if(!artist){toast('아티스트를 입력해주세요');document.getElementById('fArtist').focus();return;}
  if(!title) {toast('공연명을 입력해주세요');document.getElementById('fTitle').focus();return;}
  if(!date)  {toast('날짜를 선택해주세요');return;}

  const newEvent={id:genId(),artist,title,date,time,venue,price:price!==''?Number(price):null,ticket,image,type:'concert'};
  allEvents.push(newEvent);
  saveEvents();
  renderAll();
  document.getElementById('overlay').classList.remove('open');
  toast('공연이 추가됐어요!');

  try {
    await fetch(SCRIPT_URL,{
      method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'add',event:newEvent})
    });
  }catch(e){}
}



/* ── edit ── */
function openEdit(ev,id){
  ev.stopPropagation();
  const actions=document.getElementById('actions_'+id);
  if(actions) actions.classList.remove('open');
  openCardId=null;
  const e=allEvents.find(ev=>ev.id===id);
  if(!e) return;
  document.getElementById('eId').value    =e.id;
  document.getElementById('eArtist').value=e.artist;
  document.getElementById('eTitle').value =e.title;
  document.getElementById('eDate').value  =e.date;
  document.getElementById('eTime').value  =e.time||'';
  document.getElementById('eVenue').value =e.venue||'';
  document.getElementById('ePrice').value =e.price!=null?e.price:'';
  document.getElementById('eTicket').value=e.ticket||'';
  document.getElementById('eImage').value=e.image||'';
  document.getElementById('editOverlay').classList.add('open');
}
function closeEditIfOut(ev){ if(ev.target===document.getElementById('editOverlay')) document.getElementById('editOverlay').classList.remove('open'); }

function submitEdit(){
  const id    =document.getElementById('eId').value;
  const artist=document.getElementById('eArtist').value.trim();
  const title =document.getElementById('eTitle').value.trim();
  const date  =document.getElementById('eDate').value;
  const time  =document.getElementById('eTime').value;
  const venue =document.getElementById('eVenue').value.trim();
  const price =document.getElementById('ePrice').value.replace(/[^0-9]/g,'');
  const ticket=document.getElementById('eTicket').value.trim();
  const image=document.getElementById('eImage').value.trim();
  if(!artist){toast('아티스트를 입력해주세요');return;}
  if(!title) {toast('공연명을 입력해주세요');return;}
  if(!date)  {toast('날짜를 선택해주세요');return;}
  const idx=allEvents.findIndex(e=>e.id===id);
  if(idx===-1) return;
  allEvents[idx]={...allEvents[idx],artist,title,date,time,venue,price:price!==''?Number(price):null,ticket,image};
  saveEvents(); renderAll();
  document.getElementById('editOverlay').classList.remove('open');
  toast('수정됐어요!');
  try{
    fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'edit',event:allEvents[idx]})});
  }catch(e){}
}

/* ── delete ── */
function deleteEvent(ev,id){
  ev.stopPropagation();
  if(!confirm('이 공연을 삭제할까요?')) return;
  allEvents=allEvents.filter(e=>e.id!==id);
  saveEvents(); renderAll();
  toast('삭제됐어요');
  try{
    fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'delete',event_id:id})});
  }catch(e){}
}

/* ── autocomplete ── */
function getAcList(type){
  if(type==='artist'){
    const set=new Set();
    allEvents.forEach(e=>e.artist.split(',').map(a=>a.trim()).filter(Boolean).forEach(a=>set.add(a)));
    return [...set].sort();
  } else if(type==='ticket'){
    const set=new Set();
    allEvents.forEach(e=>{ if(e.ticket) set.add(e.ticket); });
    return [...set].sort();
  } else {
    const set=new Set();
    allEvents.forEach(e=>{ if(e.venue) set.add(e.venue); });
    return [...set].sort();
  }
}

function showAc(inputId, dropId, type){
  const input=document.getElementById(inputId);
  const drop=document.getElementById(dropId);
  if(!input||!drop) return;
  const q=input.value.trim().toLowerCase();
  const list=getAcList(type).filter(v=>!q||v.toLowerCase().includes(q));
  if(!list.length){ drop.classList.remove('open'); return; }
  drop.innerHTML=list.map(v=>
    `<div class="ac-item" onmousedown="pickAc('${inputId}','${dropId}',event)">${v}</div>`
  ).join('');
  drop.classList.add('open');
}

function pickAc(inputId, dropId, ev){
  ev.preventDefault();
  const input=document.getElementById(inputId);
  const drop=document.getElementById(dropId);
  if(input) input.value=ev.currentTarget.textContent;
  if(drop) drop.classList.remove('open');
}

function hideAc(dropId){
  setTimeout(()=>{
    const drop=document.getElementById(dropId);
    if(drop) drop.classList.remove('open');
  },150);
}

/* ── auto time format ── */
function autoTime(input){
  let v = input.value.replace(/[^0-9]/g,'');
  if(v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2,4);
  input.value = v;
}


/* ── detail sheet ── */
let _detailId = null;

function openDetail(id){
  const e = allEvents.find(ev => ev.id === id);
  if(!e) return;
  _detailId = id;

  document.getElementById('dArtist').textContent = e.artist;
  document.getElementById('dTitle').textContent  = e.title;

  const fmtKRW = n => n.toLocaleString('ko-KR') + '원';
  const timeStr = e.time ? ' · ' + String(e.time).slice(0,5) : '';
  const rows = [
    ['날짜', fmtDate(e.date) + timeStr],
    e.venue  ? ['장소', e.venue]  : null,
    e.price != null ? ['티켓비', e.price === 0 ? '무료' : fmtKRW(e.price)] : null,
    e.ticket ? ['티켓처', e.ticket] : null,
  ].filter(Boolean);

  // poster image in detail
  const dImg = document.getElementById('dImg');
  if(dImg){ if(e.image){ dImg.src=e.image; dImg.style.display='block'; } else { dImg.style.display='none'; } }

  document.getElementById('dRows').innerHTML = rows.map(([label, val]) =>
    `<div class="detail-row">
      <div class="detail-label">${label}</div>
      <div class="detail-value">${val}</div>
    </div>`
  ).join('');

  // setlist
  const saved = getSetlist(id);
  document.getElementById('setlistInput').value = saved || '';
  // close setlist by default
  document.getElementById('setlistBody').classList.remove('open');
  document.getElementById('setlistIcon').classList.remove('open');

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetailIfOut(ev){
  if(ev.target === document.getElementById('detailOverlay'))
    document.getElementById('detailOverlay').classList.remove('open');
}

function toggleSetlist(){
  document.getElementById('setlistBody').classList.toggle('open');
  document.getElementById('setlistIcon').classList.toggle('open');
}

/* setlist localStorage */
function getSetlist(id){ try{ return localStorage.getItem('setlist_'+id)||''; }catch(e){ return ''; } }
function saveSetlist(){
  const id  = _detailId;
  const val = document.getElementById('setlistInput').value;
  try{ localStorage.setItem('setlist_'+id, val); }catch(e){}
  toast('셋리스트 저장됐어요!');
}

function deleteFromDetail(){
  if(!confirm('이 공연을 삭제할까요?')) return;
  document.getElementById('detailOverlay').classList.remove('open');
  deleteEvent(new Event('click'), _detailId);
}

function editFromDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
  setTimeout(()=>{ openEdit(new Event('click'), _detailId); }, 200);
}

/* ── load ── */
function loadData(){
  // 서버가 항상 진짜 원본 — 로컬 캐시 무시
  localStorage.removeItem(EVT_KEY);

  const cbName='asCb_'+Date.now();
  const script=document.createElement('script');
  window[cbName]=function(json){
    delete window[cbName];
    try{document.head.removeChild(script);}catch(e){}
    if(!json||!json.ok){ renderAll(); return; }

    const rows=json.data.events||[];
    allEvents=rows
      .filter(r=>r.artist&&r.title&&r.date)
      .map(r=>({
        id: r.id||(r.artist+'|'+r.date+'|'+r.title),
        artist:r.artist, title:r.title, date:r.date,
        time:r.time||'', venue:r.venue||'',
        price:r.price!=null&&r.price!==''?Number(r.price):null, ticket:r.ticket||'', image:r.image||'',
        type:'concert',
      }));

    saveEvents();
    renderAll();
  };
  script.onerror=()=>{
    try{document.head.removeChild(script);}catch(e){}
    renderAll();
  };
  script.src=`${SCRIPT_URL}?action=all&callback=${cbName}&t=${Date.now()}`;
  document.head.appendChild(script);
}

window.addEventListener('DOMContentLoaded',loadData);
</script>
