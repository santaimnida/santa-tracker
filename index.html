<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Artist Schedule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg:#FFFFFF; --surface:#FFFFFF; --surface2:#F2F2F7;
    --border:rgba(0,0,0,0.08); --border-strong:rgba(0,0,0,0.11);
    --text:#1C1C1E; --text3:#8E8E93; --accent:#007AFF;
    --concert:#007AFF; --concert-bg:rgba(0,122,255,0.10);
    --release:#AF52DE; --release-bg:rgba(175,82,222,0.10);
    --green:#34C759; --red:#FF3B30; --red-bg:rgba(255,59,48,0.10);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#000; --surface:#1C1C1E; --surface2:#2C2C2E;
    --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.11);
    --text:#FFF; --text3:#8E8E93;
    --concert-bg:rgba(0,122,255,0.15); --release-bg:rgba(175,82,222,0.15);
    --red-bg:rgba(255,59,48,0.13);
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{
    font-family:var(--font);background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  /* ── center wrapper ── */
  .wrap{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    position:relative;
  }

  /* ── header ── */
  .header{
    position:fixed;top:0;z-index:100;
    width:100%;max-width:430px;
    background:rgba(255,255,255,0.94);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:0.5px solid var(--border-strong);
    padding-top:var(--safe-top);
  }
  @media(prefers-color-scheme:dark){.header{background:rgba(0,0,0,0.9)}}

  .header-row{display:flex;align-items:center;padding:13px 20px 8px;gap:10px}
  .header-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;flex:1}

  .search-wrap{
    display:flex;align-items:center;background:var(--surface2);
    border-radius:9px;padding:0 9px;gap:6px;height:30px;width:120px;
    transition:width 0.2s ease;
  }
  .search-wrap.focused{width:170px}
  .search-wrap svg{color:var(--text3);flex-shrink:0}
  .search-input{width:100%;background:none;border:none;outline:none;font-size:13px;font-family:var(--font);color:var(--text)}
  .search-input::placeholder{color:var(--text3)}

  .filter-row{display:flex;padding:0 20px 9px;gap:6px}
  .f-tab{
    height:26px;padding:0 12px;border:none;background:var(--surface2);
    border-radius:20px;font-size:12px;font-weight:500;font-family:var(--font);
    color:var(--text3);cursor:pointer;white-space:nowrap;
    transition:background 0.12s,color 0.12s;
  }
  .f-tab:active{opacity:0.6}
  .f-tab.active{background:var(--accent);color:#fff}

  /* ── content ── */
  .content{padding-top:92px;padding-bottom:calc(28px + var(--safe-bottom))}

  .section-label{
    font-size:12px;font-weight:600;color:var(--text3);
    letter-spacing:0.05em;text-transform:uppercase;padding:20px 20px 8px;
  }
  .event-list{display:flex;flex-direction:column;gap:8px;padding:0 20px}

  /* ── card — fixed 72px height ── */
  .event-card{
    height:72px;background:var(--surface);
    border-radius:12px;border:0.5px solid var(--border-strong);overflow:hidden;
  }
  .card-inner{
    display:flex;align-items:center;
    height:100%;padding:0 14px 0 12px;gap:11px;
  }

  .type-bar{width:3px;border-radius:3px;flex-shrink:0;align-self:stretch}
  .bar-concert{background:var(--concert)}
  .bar-release{background:var(--release)}

  .card-info{flex:1;min-width:0;overflow:hidden}

  .card-top{display:flex;align-items:center;gap:5px;margin-bottom:2px}

  .type-pill{
    font-size:10px;font-weight:600;width:28px;text-align:center;
    padding:2px 0;border-radius:4px;flex-shrink:0;
  }
  .pill-concert{background:var(--concert-bg);color:var(--concert)}
  .pill-release{background:var(--release-bg);color:var(--release)}

  .card-artist{
    font-size:11px;color:var(--text3);font-weight:500;
    flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .card-title{
    font-size:14px;font-weight:600;color:var(--text);
    letter-spacing:-0.2px;line-height:1.25;margin-bottom:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .card-meta{display:flex;gap:8px;overflow:hidden}
  .meta-item{
    display:flex;align-items:center;gap:3px;
    font-size:11px;color:var(--text3);white-space:nowrap;
  }

  /* ── right column ── */
  .card-right{
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:5px;flex-shrink:0;width:34px;
  }
  .d-chip{
    font-size:10px;font-weight:600;padding:2px 5px;border-radius:20px;
    background:var(--surface2);color:var(--text3);white-space:nowrap;
    text-align:center;min-width:30px;
  }
  .d-chip.soon{background:var(--red-bg);color:var(--red)}
  .d-chip.dday{background:var(--accent);color:#fff}
  .d-chip.past{opacity:0.38}

  .check-circle{
    width:15px;height:15px;border-radius:50%;
    border:1.5px solid var(--border-strong);background:transparent;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all 0.13s;flex-shrink:0;
  }
  .check-circle:active{transform:scale(0.82)}
  .check-circle.going{background:var(--green);border-color:var(--green)}
  .check-circle svg{opacity:0;transition:opacity 0.1s}
  .check-circle.going svg{opacity:1}
  .check-placeholder{width:15px;height:15px;flex-shrink:0}

  /* ── status bar ── */
  .status-bar{
    margin:12px 20px 0;padding:10px 14px;
    background:var(--surface2);border-radius:10px;
    font-size:12px;color:var(--text3);text-align:center;
    border:0.5px solid var(--border-strong);
  }
  .status-bar.ok{color:var(--green)}
  .status-bar.err{color:var(--red)}
  .status-bar.loading{color:var(--accent)}

  /* ── empty ── */
  .empty{text-align:center;padding:64px 20px}
  .empty-icon{font-size:32px;margin-bottom:10px;opacity:0.3}
  .empty-t{font-size:14px;font-weight:500;color:var(--text3)}
  .empty-s{font-size:12px;color:var(--text3);margin-top:4px;opacity:0.7}

  /* ── toast ── */
  .toast{
    position:fixed;bottom:calc(24px + var(--safe-bottom));
    left:50%;transform:translateX(-50%) translateY(14px);
    background:rgba(28,28,30,0.9);color:#fff;
    font-size:13px;font-weight:500;padding:8px 16px;
    border-radius:20px;z-index:400;opacity:0;
    transition:opacity .16s,transform .16s;
    white-space:nowrap;pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">

<header class="header">
  <div class="header-row">
    <span class="header-title">🎵 Artist Schedule</span>
    <div class="search-wrap" id="searchWrap">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input class="search-input" id="searchInput" placeholder="검색"
        oninput="renderAll()"
        onfocus="document.getElementById('searchWrap').classList.add('focused')"
        onblur="onBlur()" autocomplete="off"/>
    </div>
  </div>
  <div class="filter-row">
    <button class="f-tab active" onclick="setFilter(this,'all')"     data-f="all">전체</button>
    <button class="f-tab"        onclick="setFilter(this,'concert')" data-f="concert">공연</button>
    <button class="f-tab"        onclick="setFilter(this,'release')" data-f="release">발매</button>
  </div>
</header>

<div class="content">
  <div class="status-bar loading" id="statusBar">연결 중...</div>
  <div id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── 설정: Apps Script URL 하드코딩 ── */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwMknxVDJA3H0gj8B7-KRYJ1iq2q8SDV7Vj0BaIi-N8AzCX9iqNhxpU4Fq2cXh575gxLw/exec';
const ATT_KEY    = 'ast_att_local'; // 스크립트 저장 실패 시 로컬 fallback

let allEvents = [];
let artists   = [];
let attended  = {};
let curFilter = 'all';

/* ── utils ── */
function daysUntil(d){
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.ceil((new Date(d) - t) / 86400000);
}
function fmtDate(d){
  return new Date(d).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
}
function fmtTime(t){
  if(!t) return '';
  // "18:00:00" → "18:00", "18:00" → "18:00"
  return t.slice(0,5);
}
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), 2000);
}
function setStatus(msg, cls){
  const el = document.getElementById('statusBar');
  el.textContent = msg; el.className = 'status-bar ' + (cls||'');
}
function onBlur(){
  document.getElementById('searchWrap').classList.remove('focused');
  setTimeout(()=>{ document.getElementById('searchInput').value=''; renderAll(); }, 150);
}

/* ── local fallback attended ── */
function loadLocalAtt(){
  try { return JSON.parse(localStorage.getItem(ATT_KEY)||'{}'); } catch(e){ return {}; }
}
function saveLocalAtt(){
  try { localStorage.setItem(ATT_KEY, JSON.stringify(attended)); } catch(e){}
}

/* ── toggle going ── */
async function toggleGoing(id, ev){
  ev.stopPropagation();
  const next = attended[id] === 'going' ? '' : 'going';
  attended[id] = next;
  if(!next) delete attended[id];
  renderAll();

  try {
    await fetchScript('POST', { event_id: id, status: next });
  } catch(e){
    // fallback: save locally
    saveLocalAtt();
  }
}

/* ── filter / render ── */
function setFilter(el, f){
  document.querySelectorAll('.f-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); curFilter = f; renderAll();
}
function getFiltered(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  return allEvents.filter(e=>{
    if(curFilter==='concert' && e.type!=='concert') return false;
    if(curFilter==='release' && e.type!=='release') return false;
    if(q && !e.artist.toLowerCase().includes(q) && !e.title.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));
}

function renderAll(){
  const filtered = getFiltered();
  const el = document.getElementById('mainContent');
  if(!filtered.length){
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">🎵</div>
      <div class="empty-t">일정이 없어요</div>
      <div class="empty-s">구글 시트에 일정을 추가해보세요</div>
    </div>`;
    return;
  }
  const groups = {};
  filtered.forEach(e=>{
    const d = new Date(e.date);
    const k = `${d.getFullYear()}년 ${d.getMonth()+1}월`;
    (groups[k]=groups[k]||[]).push(e);
  });
  let html = '';
  for(const [month, evs] of Object.entries(groups)){
    html += `<div class="section-label">${month}</div><div class="event-list">`;
    evs.forEach(e=>{ html += renderCard(e); });
    html += `</div>`;
  }
  el.innerHTML = html;
}

function renderCard(e){
  const days    = daysUntil(e.date);
  const isCon   = e.type === 'concert';
  const isGoing = attended[e.id] === 'going';

  let cc='d-chip', ct='';
  if(days===0)             { cc='d-chip dday'; ct='D-DAY'; }
  else if(days>0&&days<=14){ cc='d-chip soon'; ct=`D-${days}`; }
  else if(days>0)          {                   ct=`D-${days}`; }
  else                     { cc='d-chip past'; ct='종료'; }

  // meta: date + time + venue
  const timeStr  = e.time  ? fmtTime(e.time)  : '';
  const venueStr = e.venue ? e.venue : '';
  const datePart = `<span class="meta-item">
    <svg width="9" height="9" viewBox="0 0 16 16" fill="none">
      <rect x="1.5" y="3" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
      <path d="M5 1.5V4M11 1.5V4M1.5 7h13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>${fmtDate(e.date)}${timeStr ? ' · '+timeStr : ''}</span>`;

  const venuePart = venueStr ? `<span class="meta-item">
    <svg width="9" height="9" viewBox="0 0 16 16" fill="none">
      <path d="M8 1.5C5.515 1.5 3.5 3.515 3.5 6c0 3.75 4.5 8.5 4.5 8.5S12.5 9.75 12.5 6c0-2.485-2.015-4.5-4.5-4.5zm0 6a1.5 1.5 0 110-3 1.5 1.5 0 010 3z" fill="currentColor"/>
    </svg>${venueStr}</span>` : '';

  const checkEl = isCon
    ? `<div class="check-circle${isGoing?' going':''}" onclick="toggleGoing('${e.id}',event)">
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
          <path d="M1 4l2 2 4-4" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`
    : `<div class="check-placeholder"></div>`;

  return `<div class="event-card"><div class="card-inner">
    <div class="type-bar ${isCon?'bar-concert':'bar-release'}"></div>
    <div class="card-info">
      <div class="card-top">
        <span class="type-pill ${isCon?'pill-concert':'pill-release'}">${isCon?'공연':'발매'}</span>
        <span class="card-artist">${e.artist}</span>
      </div>
      <div class="card-title">${e.title}</div>
      <div class="card-meta">${datePart}${venuePart}</div>
    </div>
    <div class="card-right">
      <span class="${cc}">${ct}</span>
      ${checkEl}
    </div>
  </div></div>`;
}

/* ── Apps Script fetch ── */
async function fetchScript(method, body){
  if(method === 'GET'){
    const url = SCRIPT_URL + '?action=all&t=' + Date.now();
    // Apps Script GET redirects — use no-cors workaround via JSONP-style
    const res = await fetch(url, {
      method: 'GET',
      redirect: 'follow',
    });
    const text = await res.text();
    // strip JSONP wrapper if present
    const clean = text.replace(/^[^{]*/,'').replace(/[^}]*$/,'') || text;
    return JSON.parse(clean.trim() || text.trim());
  } else {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
  }
}

/* ── load from Apps Script ── */
async function loadData(){
  setStatus('동기화 중...', 'loading');
  try {
    const json = await fetchScript('GET');

    if(!json || !json.ok) throw new Error(json?.error || 'no data');

    const data = json.data;

    // artists
    artists = (data.artists||[]).filter(a=>a.id && a.name);
    const am = {}; artists.forEach(a=>am[a.id]=a.name);

    // single events sheet — type 컬럼으로 concert/release 구분
    allEvents = (data.events||[])
      .filter(e => e.id && e.date && e.title)
      .map(e => ({
        id:     e.id,
        artist: am[e.artist_id] || e.artist_id || '?',
        title:  e.title,
        date:   e.date,
        time:   e.time   || '',
        venue:  e.venue  || '',
        type:   (e.type  || 'concert').toLowerCase(),
      }));

    // attended from sheet
    attended = {};
    (data.attended||[]).forEach(a=>{
      if(a.event_id && a.status) attended[a.event_id] = a.status;
    });
    // merge local fallback
    const local = loadLocalAtt();
    Object.entries(local).forEach(([k,v])=>{ if(!attended[k]) attended[k]=v; });

    setStatus('✓ 동기화됨 · ' + new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}), 'ok');
    renderAll();
  } catch(err){
    console.error('loadData error:', err);
    setStatus('연결 실패 — 시트 확인 필요', 'err');
    // load local attended so UI stays usable
    attended = loadLocalAtt();
    renderAll();
  }
}

window.addEventListener('DOMContentLoaded', ()=>{ loadData(); });
</script>
</div>
</body>
</html>
